<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Mérida — Eventos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sand:    #f5efe6;
      --parch:   #e8dcc8;
      --ochre:   #c9a84c;
      --rust:    #9e3f2b;
      --ink:     #1c1410;
      --smoke:   #7a6e63;
      --card-bg: #fdf8f2;
      --border:  #d9cebb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--sand);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: var(--sand);
      padding: 3.5rem 2rem 2.5rem;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(201,168,76,.06) 40px,
        rgba(201,168,76,.06) 41px
      );
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
    }
    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: .7rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--ochre);
      margin-bottom: .6rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -.02em;
    }
    header h1 em {
      font-style: italic;
      color: var(--ochre);
    }
    .subtitle {
      margin-top: .9rem;
      font-size: .9rem;
      color: rgba(245,239,230,.55);
      letter-spacing: .04em;
    }
    .meta-bar {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      font-size: .75rem;
      color: rgba(245,239,230,.4);
      letter-spacing: .05em;
    }
    .meta-bar span { display: flex; align-items: center; gap: .35rem; }
    #last-updated { color: var(--ochre); }

    /* ── Main ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .8rem;
      margin-bottom: 2rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    #event-count {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--smoke);
    }
    #event-count strong { color: var(--ink); }
    #search {
      padding: .55rem 1rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--card-bg);
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      color: var(--ink);
      width: 220px;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: var(--ochre); }
    #search::placeholder { color: var(--smoke); }

    /* ── Grid ── */
    #events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.4rem;
    }

    /* ── Card ── */
    .event-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1.4rem 1.5rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .65rem;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      animation: fadeUp .35s both;
    }
    .event-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(28,20,16,.1);
      border-color: var(--ochre);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-date {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--rust);
      font-weight: 500;
    }
    .card-date::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 1px;
      background: var(--rust);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      line-height: 1.35;
      color: var(--ink);
    }

    .card-location {
      font-size: .78rem;
      color: var(--smoke);
      display: flex;
      align-items: flex-start;
      gap: .35rem;
    }
    .card-location svg { flex-shrink: 0; margin-top: 1px; }

    .card-footer {
      margin-top: auto;
      padding-top: .7rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-source {
      font-size: .65rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--smoke);
      opacity: .7;
    }
    .card-link {
      font-size: .75rem;
      font-weight: 500;
      color: var(--rust);
      text-decoration: none;
      letter-spacing: .04em;
      display: flex;
      align-items: center;
      gap: .3rem;
      transition: color .15s;
    }
    .card-link:hover { color: var(--ochre); }
    .card-link svg { transition: transform .15s; }
    .card-link:hover svg { transform: translate(2px,-2px); }

    /* ── States ── */
    #status-msg {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--smoke);
    }
    #status-msg .big { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: .5rem; }
    #status-msg p { font-size: .9rem; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--ochre);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1.2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: .72rem;
      color: var(--smoke);
      border-top: 1px solid var(--border);
      letter-spacing: .05em;
    }
    footer a { color: var(--ochre); text-decoration: none; }

    @media (max-width: 600px) {
      header { padding: 2.5rem 1.2rem 2rem; }
      #events-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <p class="eyebrow">Extremadura · España</p>
    <h1>Agenda<br><em>Mérida</em></h1>
    <p class="subtitle">Eventos, cultura y ocio en la ciudad eterna</p>
    <div class="meta-bar">
      <span>⟳ Actualizado cada 6 horas</span>
      <span>Última sync: <span id="last-updated">—</span></span>
    </div>
  </div>
</header>

<main>
  <div class="toolbar">
    <div id="event-count">Cargando eventos…</div>
    <input id="search" type="search" placeholder="Buscar evento…" autocomplete="off" />
  </div>

  <div id="status-msg">
    <div class="spinner"></div>
    <div class="big">Cargando agenda</div>
    <p>Obteniendo los próximos eventos…</p>
  </div>

  <div id="events-grid" style="display:none"></div>
</main>

<footer>
  Proyecto open-source — <a href="https://github.com/pachexyz/merida-agenda" target="_blank" rel="noopener">github.com/pachexyz/merida-agenda</a>
</footer>

<script>
(async () => {
  const grid      = document.getElementById('events-grid');
  const statusMsg = document.getElementById('status-msg');
  const countEl   = document.getElementById('event-count');
  const searchEl  = document.getElementById('search');
  const updatedEl = document.getElementById('last-updated');

  let allEvents = [];

  // ── Formatear fecha ──────────────────────────────
  function fmtDate(iso) {
    if (!iso) return 'Fecha por confirmar';
    try {
      const [y, m, d] = iso.split('-').map(Number);
      return new Intl.DateTimeFormat('es-ES', {
        day: 'numeric', month: 'long', year: 'numeric',
      }).format(new Date(y, m - 1, d));
    } catch { return iso; }
  }

  // ── Renderizar tarjeta ───────────────────────────
  function renderCard(ev, delay) {
    const card = document.createElement('article');
    card.className = 'event-card';
    card.style.animationDelay = `${delay * 50}ms`;

    const linkHtml = ev.url
      ? `<a class="card-link" href="${escHtml(ev.url)}" target="_blank" rel="noopener">
           Ver evento
           <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.6">
             <path d="M2 9L9 2M9 2H4M9 2v5"/>
           </svg>
         </a>`
      : '';

    card.innerHTML = `
      <span class="card-date">${fmtDate(ev.date)}</span>
      <h2 class="card-title">${escHtml(ev.title)}</h2>
      ${ev.location ? `
      <p class="card-location">
        <svg width="11" height="13" viewBox="0 0 11 13" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M5.5 1C3.01 1 1 3.01 1 5.5c0 3.5 4.5 6.5 4.5 6.5s4.5-3 4.5-6.5C10 3.01 7.99 1 5.5 1z"/>
          <circle cx="5.5" cy="5.5" r="1.5"/>
        </svg>
        ${escHtml(ev.location)}
      </p>` : ''}
      <div class="card-footer">
        <span class="card-source">${escHtml(ev.source || '')}</span>
        ${linkHtml}
      </div>
    `;
    return card;
  }

  // ── Mostrar eventos ──────────────────────────────
  function render(events) {
    grid.innerHTML = '';
    if (!events.length) {
      grid.style.display = 'none';
      statusMsg.style.display = 'block';
      statusMsg.innerHTML = `
        <div class="big">Sin resultados</div>
        <p>No hay eventos que coincidan con la búsqueda.</p>`;
      countEl.innerHTML = 'Sin resultados';
      return;
    }
    statusMsg.style.display = 'none';
    grid.style.display = 'grid';
    events.forEach((ev, i) => grid.appendChild(renderCard(ev, i)));
    countEl.innerHTML = `<strong>${events.length}</strong> evento${events.length === 1 ? '' : 's'} próximos`;
  }

  // ── Escape HTML ──────────────────────────────────
  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Fetch ────────────────────────────────────────
  try {
    const res  = await fetch('events.json?_=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    allEvents = data.events || [];

    // Última actualización
    if (data.updated_at && data.updated_at !== '1970-01-01T00:00:00Z') {
      updatedEl.textContent = new Intl.DateTimeFormat('es-ES', {
        day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit',
      }).format(new Date(data.updated_at));
    }

    render(allEvents);
  } catch (err) {
    statusMsg.innerHTML = `
      <div class="big">Error al cargar</div>
      <p>No se pudo obtener la agenda. Inténtalo de nuevo más tarde.<br><small>${err.message}</small></p>`;
    countEl.textContent = 'Error al cargar';
    console.error(err);
  }

  // ── Búsqueda en tiempo real ──────────────────────
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.toLowerCase().trim();
    if (!q) { render(allEvents); return; }
    render(allEvents.filter(ev =>
      (ev.title    || '').toLowerCase().includes(q) ||
      (ev.location || '').toLowerCase().includes(q) ||
      (ev.source   || '').toLowerCase().includes(q)
    ));
  });
})();
</script>
</body>
</html>
